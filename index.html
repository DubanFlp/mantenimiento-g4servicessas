<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sitio en mantenimiento</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #1f3864;
      text-align: center;
    }

    .contenedor {
      max-width: 600px;
      padding: 40px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,.10);
    }

    h1 {
      font-size: 34px;
      margin-bottom: 16px;
    }

    p {
      font-size: 18px;
      line-height: 1.6;
      color: #555;
    }

    .icono {
      font-size: 58px;
      margin-bottom: 15px;
    }
  </style>
</head>
<body>
  <div class="contenedor">
    <div class="icono">🔧</div>
    <h1>Sitio en mantenimiento</h1>
    <p>
      Estamos realizando trabajos de actualización y mantenimiento.
      Regresaremos pronto.
    </p>
    <p>Gracias por su comprensión.</p>
  </div>
</body>
</html>
